name: docker-scan

on:
    workflow_call:

jobs:
    docker-scanning:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                folders: ["backend", "frontend"]

        steps:
            - name: Code checkout
              uses: actions/checkout@v4

            - name: ${{ matrix.folders }} Docker file linting
              uses: hadolint/hadolint-action@v3.1.0
              with:
                  dockerfile: ${{ matrix.folders }}/Dockerfile

            - name: Docker Setup [Login]
              uses: docker/login-action@v3
              with:
                  username: ${{ vars.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker Build
              working-directory: ${{ matrix.folders }}
              run: |
                  docker build \
                    -t ${{ vars.DOCKERHUB_USERNAME }}/devboard-${{ matrix.folders }}:latest \
                    .

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ${{ vars.DOCKERHUB_USERNAME }}/devboard-${{ matrix.folders }}:latest
                  format: table
                  exit-code: "1"
                  ignore-unfixed: true
                  vuln-type: os,library
                  severity: CRITICAL
